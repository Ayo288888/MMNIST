{% extends "base_dashboard.html" %}

{% block content %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDS Settings</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1a2639;
            --secondary: #ff6b35;
            --accent: #00d4ff;
            --dark-bg: transparent;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
            height: 100%;
            background: var(--dark-bg);
            color: #2c3e50;
            font-size: 12px;
            overflow-x: hidden;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 220px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), #2c3e50);
            padding: 20px 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
            transition: width 0.3s ease;
            z-index: 1000;
        }

        .sidebar h3 {
            font-size: 14px;
            padding: 0 15px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar a {
            color: #d1d5db;
            text-decoration: none;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
        }

        .sidebar a:hover, .sidebar a.active {
            background: var(--secondary);
            color: #fff;
        }

        .sidebar i {
            margin-right: 8px;
            width: 20px;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
            min-height: 100vh;
            transition: margin-left 0.3s ease;
        }

        .navbar {
            background: var(--primary);
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .navbar-brand {
            color: #fff;
            font-size: 12px;
            font-weight: 500;
        }

        .settings-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .settings-section h2 {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 15px;
        }

        .form-label {
            color: #495057;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .form-control, .form-select {
            background: #f8f9fa;
            border: 1px solid #ced4da;
            color: #2c3e50;
            font-size: 12px;
            padding: 8px;
            border-radius: 5px;
        }

        .form-control:focus {
            background: #ffffff;
            border: 1px solid var(--accent);
            box-shadow: 0 0 0 0.2rem rgba(0, 212, 255, 0.25);
            color: #2c3e50;
        }

        .btn-custom {
            background: var(--secondary);
            color: #fff;
            font-size: 12px;
            padding: 8px 15px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .btn-custom:hover {
            background: #e55a2e;
        }

        .color-preview {
            width: 20px;
            height: 20px;
            display: inline-block;
            border-radius: 50%;
            margin-left: 10px;
            vertical-align: middle;
        }

        .footer {
            background: var(--primary);
            padding: 10px;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 220px;
            right: 0;
            font-size: 8px;
            color: #9ca3af;
            transition: left 0.3s ease;
        }

        /* Responsive Design */
        @media (max-width: 992px) {
            .sidebar {
                width: 70px;
            }
            .sidebar h3, .sidebar a span {
                display: none;
            }
            .content, .footer {
                margin-left: 70px;
                left: 70px;
            }
            .settings-section {
                padding: 15px;
            }
        }

        @media (max-width: 576px) {
            .sidebar {
                width: 50px;
            }
            .content, .footer {
                margin-left: 50px;
                left: 50px;
            }
            .navbar-brand {
                font-size: 10px;
            }
            .settings-section h2 {
                font-size: 12px;
            }
            .form-label, .form-control, .form-select, .btn-custom {
                font-size: 8px;
            }
            .btn-custom {
                padding: 6px 12px;
            }
        }
    </style>
</head>
<body>
    

    <!-- Content Area -->
    <div class="content">
        <!-- Navbar -->
        <nav class="navbar">
            <a class="navbar-brand" href="#">Settings</a>
        </nav>

        <!-- Dashboard Appearance -->
        <div class="settings-section">
            <h2>Dashboard Appearance</h2>
            <div class="mb-3">
                <label for="dashboardColor" class="form-label">Primary Dashboard Color</label>
                <select class="form-select" id="dashboardColor" onchange="previewColor(this)">
                    <option value="#1a2639" selected>Dark Blue (Default)</option>
                    <option value="#2a4066">Steel Blue</option>
                    <option value="#3d2c8d">Deep Purple</option>
                    <option value="#1b5e20">Forest Green</option>
                </select>
                <span class="color-preview" id="colorPreview" style="background: #1a2639;"></span>
            </div>
            <button class="btn-custom" onclick="saveDashboardColor()">Save Color</button>
        </div>

        <!-- User Account -->
        <div class="settings-section">
            <h2>User Account</h2>
            <div class="mb-3">
                <label for="currentPassword" class="form-label">Current Password</label>
                <input type="password" class="form-control" id="currentPassword" placeholder="Enter current password">
            </div>
            <div class="mb-3">
                <label for="newPassword" class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" placeholder="Enter new password">
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm New Password</label>
                <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm new password">
            </div>
            <button class="btn-custom" onclick="changePassword()">Update Password</button>
        </div>

        <!-- System Settings -->
        <div class="settings-section">
            <h2>System Settings</h2>
            <div class="mb-3">
                <label for="alertThreshold" class="form-label">Alert Sensitivity Threshold</label>
                <input type="number" class="form-control" id="alertThreshold" min="1" max="100" value="50" placeholder="1-100">
            </div>
            <div class="mb-3">
                <label for="logRetention" class="form-label">Log Retention Period (Days)</label>
                <select class="form-select" id="logRetention">
                    <option value="7">7 Days</option>
                    <option value="30" selected>30 Days</option>
                    <option value="90">90 Days</option>
                    <option value="365">365 Days</option>
                </select>
            </div>
            <button class="btn-custom" onclick="saveSystemSettings()">Save Settings</button>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>© 2025 Advanced IDS - All Rights Reserved</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        // Preview color change
        function previewColor(select) {
            const color = select.value;
            document.getElementById('colorPreview').style.background = color;
        }

        // Save dashboard color (placeholder function)
        function saveDashboardColor() {
            const color = document.getElementById('dashboardColor').value;
            document.documentElement.style.setProperty('--primary', color);
            alert('Do you want to save this colour?');
        }

        // Change password (function)
    function changePassword() {
        const currentPassword = document.getElementById('currentPassword').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (!currentPassword || !newPassword || !confirmPassword) {
            alert('Please fill in all password fields.');
            return;
        }

        if (newPassword !== confirmPassword) {
            alert('New password and confirmation do not match.');
            return;
        }

        fetch('/update_password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                currentPassword: currentPassword,
                newPassword: newPassword,
                confirmPassword: confirmPassword
            })
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                alert(data.message);
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            } else {
                alert(data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('An error occurred. Please try again.');
        });
    }


        // Save system settings (placeholder function)
        function saveSystemSettings() {
            const threshold = document.getElementById('alertThreshold').value;
            const retention = document.getElementById('logRetention').value;

            if (threshold < 1 || threshold > 100) {
                alert('Threshold must be between 1 and 100.');
            } else {
                alert(`Settings saved!\nThreshold: ${threshold}\nRetention: ${retention} days (Note: This is a demo)`);
            }
        }
    </script>
</body>
</html>
{% endblock %}

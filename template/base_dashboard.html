<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intrusion Detection Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../static/css/dashboard.css">
    <script src="https://code.iconify.design/iconify-icon/1.0.8/iconify-icon.min.js"></script>
</head>
<body>
    <div class="hamburger" onclick="toggleSidebar(this)">
        <div></div>
        <div></div>
        <div></div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
        <h3>System Dashboard</h3>
        <ul class="list-unstyled components">
            <li class="{{ 'active' if request.endpoint == 'dashboard' }}">
                <a href="{{ url_for('dashboard') }}">
                    <iconify-icon icon="fluent:gauge-20-regular"></iconify-icon> Dashboard
                </a>
            </li>
            <li class="{{ 'active' if request.endpoint == 'attack' }}">
                <a href="{{ url_for('attack') }}">
                    <iconify-icon icon="fluent:eye-20-regular"></iconify-icon> Detect Attack
                </a>
            </li>
            <li class="{{ 'active' if request.endpoint == 'alerts' }}">
                <a href="{{ url_for('alerts') }}">
                    <iconify-icon icon="fluent:alert-20-regular"></iconify-icon> Alerts
                </a>
            </li>
            <li class="{{ 'active' if request.endpoint == 'statistics' }}">
                <a href="{{ url_for('statistics') }}">
                    <iconify-icon icon="fluent:data-trending-20-regular"></iconify-icon> Statistics
                </a>
            </li>
            <li class="{{ 'active' if request.endpoint == 'logs' }}">
                <a href="{{ url_for('logs') }}">
                    <iconify-icon icon="fluent:shield-20-regular"></iconify-icon> Security Logs
                </a>
            </li>
            <li class="{{ 'active' if request.endpoint == 'settings' }}">
                <a href="{{ url_for('settings') }}">
                    <iconify-icon icon="fluent:settings-20-regular"></iconify-icon> Settings
                </a>
            </li>
            <li class="{{ 'active' if request.endpoint == 'landing' }}">
                <a href="{{ url_for('landing') }}" target="_blank">
                    <iconify-icon icon="fluent:globe-20-regular"></iconify-icon> Website
                </a>
            </li>
            <li class="{{ 'active' if request.endpoint == 'logout' }}">
                <a href="{{ url_for('logout') }}">
                    <iconify-icon icon="fluent:arrow-exit-20-regular"></iconify-icon> Logout
                </a>
            </li>
        </ul>
    </div>

    <!-- Page Content -->
    <div class="dashboard-content">
        {% block content %}{% endblock %}
    </div>

    <script>
        function toggleSidebar(el) {
            el.classList.toggle("active");
            document.querySelector(".sidebar").classList.toggle("show");
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
